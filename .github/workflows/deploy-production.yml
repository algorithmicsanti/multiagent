name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - backend
          - frontend
      confirm:
        description: "Type DEPLOY_PROD to confirm"
        required: true
        default: ""

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm production deploy
        run: |
          if [ "${{ inputs.confirm }}" != "DEPLOY_PROD" ]; then
            echo "Confirmation failed. Type DEPLOY_PROD"
            exit 1
          fi

  deploy:
    needs: gate
    runs-on: [self-hosted, linux, production]
    environment: production
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.32.1 --activate

      - name: Deploy (${{ inputs.target }})
        env:
          AUTO_ROLLBACK_ON_FAIL: "1"
        run: bash infra/scripts/deploy-pipeline.sh "${{ inputs.target }}"