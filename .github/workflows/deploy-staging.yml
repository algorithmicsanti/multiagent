name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target"
        required: true
        default: "full"
        type: choice
        options:
          - full
          - backend
          - frontend

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, linux, staging]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.32.1 --activate

      - name: Deploy (${{ inputs.target }})
        env:
          AUTO_ROLLBACK_ON_FAIL: "1"
        run: bash infra/scripts/deploy-pipeline.sh "${{ inputs.target }}"